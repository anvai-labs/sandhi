name: release

# Unified version: one tag `vX.Y.Z` on `main` releases everything (binaries + PyPI + crates.io +
# npm). See RELEASING.md for the develop→main→tag flow and the one-time publisher setup.
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write # create the GitHub Release + upload binary assets

jobs:
  # ── 1a. Create the GitHub Release once, so the binary matrix has a target to upload to. ────
  #        (A tag push does not auto-create a Release; without this the upload jobs fail with
  #        "release not found", and parallel jobs would otherwise race to create it.)
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create the GitHub Release for this tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh release view "${GITHUB_REF_NAME}" --repo "$REPO" >/dev/null 2>&1 \
            || gh release create "${GITHUB_REF_NAME}" --repo "$REPO" \
                 --title "${GITHUB_REF_NAME}" --generate-notes

  # ── 1b. Native sandhi-proxy server binaries → the GitHub Release ───────────────────────────
  #        Native-only (no cross): the proxy links bundled SQLite (sandhi-store), whose C build
  #        needs the target's C toolchain. aarch64-linux is a follow-up (cross C toolchain).
  binaries:
    name: binary (${{ matrix.target }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: macos-13, target: x86_64-apple-darwin }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Set version from tag
        run: |
          cargo install cargo-edit --locked || true
          cargo set-version "${GITHUB_REF_NAME#v}"
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: sandhi-proxy
          target: ${{ matrix.target }}
          archive: sandhi-proxy-$tag-$target
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. PyPI wheels (sandhi-gateway) — build matrix + OIDC Trusted Publishing ───────────────
  pypi-build:
    name: wheels (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Set version from tag
        shell: bash
        run: |
          cargo install cargo-edit --locked || true
          ( cd bindings/python && cargo set-version "${GITHUB_REF_NAME#v}" )
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release -m bindings/python/Cargo.toml --out dist
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist

  pypi-publish:
    needs: pypi-build
    runs-on: ubuntu-latest
    environment: pypi # scope the OIDC trusted publisher (configure on PyPI, see RELEASING.md)
    permissions:
      id-token: write # OIDC — no stored token
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  # ── 3. crates.io (sandhi-core → sandhi-providers → sandhi-proxy) ───────────────────────────
  crates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "::notice::CARGO_REGISTRY_TOKEN not set — skipping crates.io publish"
            exit 0
          fi
          cargo install cargo-edit --locked || true
          cargo set-version "${GITHUB_REF_NAME#v}"
          cargo publish -p sandhi-core
          cargo publish -p sandhi-providers
          cargo publish -p sandhi-store
          cargo publish -p sandhi-proxy

  # ── 4. npm (@anvai-labs/sandhi) — per-platform native builds + napi prepublish ─────────────
  npm-build:
    name: npm build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: macos-13, target: x86_64-apple-darwin }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Build native addon
        working-directory: bindings/node
        run: |
          npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
          npm install
          npx napi build --platform --release
      - uses: actions/upload-artifact@v4
        with:
          name: napi-${{ matrix.target }}
          path: bindings/node/*.node

  npm-publish:
    needs: npm-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - uses: actions/download-artifact@v4
        with:
          pattern: napi-*
          merge-multiple: true
          path: bindings/node/artifacts
      - name: Publish to npm
        working-directory: bindings/node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::notice::NPM_TOKEN not set — skipping npm publish"
            exit 0
          fi
          npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
          npm install
          npx napi artifacts --dir artifacts
          npx napi prepublish -t npm --skip-gh-release
          npm publish --access public
