name: ci

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo build --workspace --all-targets
      - run: cargo test --workspace

  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: usage-event schema is valid JSON Schema
        run: |
          python3 -c "import json; json.load(open('schemas/usage-event.v1.schema.json')); print('schema OK')"

  python-binding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: fmt + clippy (the binding is its own workspace)
        run: |
          cargo fmt --manifest-path bindings/python/Cargo.toml --check
          cargo clippy --manifest-path bindings/python/Cargo.toml --all-targets -- -D warnings
      - run: pip install maturin
      - name: build + install the wheel
        run: |
          maturin build -m bindings/python/Cargo.toml --out dist
          pip install dist/*.whl
      - name: run binding tests
        run: python bindings/python/tests/test_gateway.py

  attribution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: No AI-agent authorship attribution in commit messages
        run: |
          set -e
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python3 scripts/check_no_agent_attribution.py \
              --range "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          elif echo "${{ github.event.before }}" | grep -qE '^0{40}$'; then
            git log -1 --format=%B > "$RUNNER_TEMP/msg.txt"
            python3 scripts/check_no_agent_attribution.py --message-file "$RUNNER_TEMP/msg.txt"
          else
            python3 scripts/check_no_agent_attribution.py \
              --range "${{ github.event.before }}..${{ github.sha }}"
          fi

  node-binding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: fmt + clippy (the node binding is its own workspace)
        run: |
          cargo fmt --manifest-path bindings/node/Cargo.toml --check
          cargo clippy --manifest-path bindings/node/Cargo.toml -- -D warnings
      - name: build + test
        working-directory: bindings/node
        run: |
          npm install
          npx napi build --platform
          npm test

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Line coverage must stay above 75%
        run: cargo llvm-cov --workspace --fail-under-lines 75

  # Single aggregate gate for branch protection (mirrors proximaDB's "CI Success").
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [rust, schema, python-binding, node-binding, attribution, coverage]
    steps:
      - run: echo "all required checks passed"
